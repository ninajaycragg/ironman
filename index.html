<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#F6F5F1" />
<title>Mike Cragg</title>
<meta name="description" content="A few things worth reading, hearing, and watching." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#F6F5F1; --paper:#FFFFFF; --ink:#16181C; --muted:#6B6F76; --faint:#9A9DA3;
    --blue:#1F4FD6; --green:#0E9F5E; --line:#E4E2DA; --line2:#EEEDE7;
    --sans:"Inter",-apple-system,BlinkMacSystemFont,sans-serif; --mono:"IBM Plex Mono",monospace;
    --ease:cubic-bezier(0.16,1,0.3,1);
    --gut:clamp(1.25rem,5vw,4rem);
  }
  *,*::before,*::after{box-sizing:border-box;margin:0}
  html{-webkit-font-smoothing:antialiased;scroll-behavior:smooth;-webkit-text-size-adjust:100%;text-size-adjust:100%}
  body{background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:1.05rem;line-height:1.7;text-rendering:optimizeLegibility;overflow-x:hidden}
  a{color:inherit;text-decoration:none;-webkit-tap-highlight-color:transparent}
  img,svg{display:block;max-width:100%}
  .wrap{max-width:760px;margin:0 auto;padding:0 var(--gut)}
  .tag{font-family:var(--mono);font-size:.66rem;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--green)}
  .meta{font-family:var(--mono);font-size:.7rem;letter-spacing:.04em;color:var(--muted)}
  .reveal{opacity:0;transform:translateY(14px);transition:opacity .7s var(--ease),transform .7s var(--ease)}
  .reveal.in{opacity:1;transform:none}
  @media(prefers-reduced-motion:reduce){*{transition-duration:.01ms!important}.reveal{opacity:1;transform:none}}

  /* ---------- top ---------- */
  .top{display:flex;justify-content:space-between;align-items:baseline;
    padding:calc(env(safe-area-inset-top) + 1.6rem) var(--gut) 0;max-width:760px;margin:0 auto}
  .top .mark{font-family:var(--sans);font-weight:700;font-size:.92rem;letter-spacing:.14em;text-transform:uppercase}
  .top .where{font-family:var(--mono);font-size:.7rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}

  /* ---------- lead (the dispatch as content) ---------- */
  .lead{padding:clamp(2.4rem,7vh,4.5rem) 0 clamp(2.4rem,6vh,3.6rem)}
  .lead .tag{display:block;margin-bottom:1.1rem}
  .lead h1{font-size:clamp(2.1rem,6vw,3.1rem);font-weight:600;letter-spacing:-.025em;line-height:1.08;max-width:18ch}
  .lead .stand{font-size:clamp(1.15rem,3.2vw,1.4rem);color:var(--muted);margin-top:1rem;max-width:34ch;line-height:1.4}
  .lead .body{margin-top:1.8rem}
  .lead .body p{max-width:64ch;margin-bottom:1.1rem;color:var(--ink)}
  .lead .body p:last-of-type{margin-bottom:0}
  .lead em{font-style:normal;border-bottom:2px solid var(--green);padding-bottom:1px}
  .lead .src{font-family:var(--mono);font-size:.72rem;color:var(--faint);margin-top:1.6rem}

  .hr{height:1px;background:var(--line);max-width:760px;margin:0 auto}

  /* ---------- index of items ---------- */
  .group{padding:clamp(2rem,5vh,3rem) 0}
  .group .lbl{font-family:var(--mono);font-size:.7rem;letter-spacing:.16em;text-transform:uppercase;color:var(--faint);margin-bottom:1.4rem}
  .item{display:grid;grid-template-columns:1fr auto;gap:1rem 1.2rem;align-items:baseline;
    padding:1.25rem 0;border-top:1px solid var(--line2);transition:padding-left .4s var(--ease)}
  .item:hover{padding-left:.5rem}
  .item .l{min-width:0}
  .item .tag{margin-bottom:.45rem;display:block}
  .item h3{font-size:1.22rem;font-weight:600;letter-spacing:-.01em;line-height:1.25;transition:color .3s var(--ease)}
  .item:hover h3{color:var(--blue)}
  .item .sub{font-family:var(--mono);font-size:.72rem;color:var(--muted);margin-top:.35rem}
  .item .note{font-size:.98rem;color:var(--muted);margin-top:.5rem;max-width:60ch;line-height:1.5}
  .item .go{align-self:center;font-family:var(--mono);font-size:.7rem;letter-spacing:.1em;text-transform:uppercase;color:var(--blue);white-space:nowrap}
  .item .go .ar{display:inline-block;transition:transform .4s var(--ease)}
  .item:hover .go .ar{transform:translateX(4px)}
  .item.audio .go::before{content:"▶  ";color:var(--green)}

  /* playlist row with peek */
  .mixrow .tracks{grid-column:1/-1;margin-top:.9rem;columns:2;column-gap:2rem;list-style:none}
  .mixrow .tracks li{font-size:.86rem;color:var(--muted);padding:.18rem 0;break-inside:avoid}
  .mixrow .tracks li .n{font-family:var(--mono);font-size:.66rem;color:var(--green);margin-right:.5rem}
  @media(max-width:560px){.mixrow .tracks{columns:1}}

  /* one inline player */
  .player{margin-top:1.4rem}
  .player .pl{font-family:var(--mono);font-size:.66rem;letter-spacing:.14em;text-transform:uppercase;color:var(--green);margin-bottom:.7rem}
  .player iframe{border-radius:12px;display:block;border:1px solid var(--line)}

  footer{padding:3rem 0 calc(env(safe-area-inset-bottom) + 3.2rem)}
  footer .row{display:flex;justify-content:space-between;align-items:baseline;gap:1rem;max-width:760px;margin:0 auto;padding:0 var(--gut)}
  footer .mark{font-weight:700;font-size:.92rem;letter-spacing:.14em;text-transform:uppercase}
  footer .meta a{color:var(--blue)}
</style>
</head>
<body class="no-grain">
  <header class="top">
    <span class="mark">Mike Cragg</span>
    <span class="where">Vancouver · 49.28°N</span>
  </header>

  <main>
    <article class="lead wrap">
      <span class="tag" id="d-tag"></span>
      <h1 id="d-title"></h1>
      <p class="stand" id="d-stand"></p>
      <div class="body" id="d-body"></div>
      <p class="src" id="d-src"></p>
    </article>

    <div class="hr"></div>

    <section class="group wrap" id="g-read"><div class="lbl">Reading</div><div id="reads"></div></section>
    <div class="hr"></div>
    <section class="group wrap" id="g-listen"><div class="lbl">Listening</div><div id="listen"></div></section>
    <div class="hr"></div>
    <section class="group wrap" id="g-watch"><div class="lbl">Watching</div><div id="watch"></div></section>
  </main>

  <footer>
    <div class="row"><span class="mark">Mike Cragg</span><span class="meta">No. 87 · <a href="versions.html">versions</a></span></div>
  </footer>

  <script src="assets/content.js"></script>
  <script src="assets/reveal.js"></script>
  <script>
    var G = window.GIFT;

    // lead = dispatch
    var d = G.dispatch;
    document.getElementById("d-tag").textContent = d.kicker;
    document.getElementById("d-title").textContent = d.title;
    document.getElementById("d-stand").textContent = d.standfirst;
    document.getElementById("d-body").innerHTML = d.body.map(function(p){return "<p>"+p+"</p>";}).join("");
    document.getElementById("d-src").textContent = d.source;

    function item(opts){
      // opts: tag, title, sub, note, url, audio
      var a = document.createElement("a");
      a.href = opts.url; a.target = "_blank"; a.rel = "noopener";
      a.className = "item reveal" + (opts.audio ? " audio" : "");
      a.innerHTML =
        '<div class="l">' +
          '<span class="tag">'+opts.tag+'</span>' +
          '<h3>'+opts.title+'</h3>' +
          (opts.sub ? '<div class="sub">'+opts.sub+'</div>' : '') +
          (opts.note ? '<div class="note">'+opts.note+'</div>' : '') +
        '</div>' +
        '<span class="go">'+(opts.audio?'Play':'Open')+' <span class="ar">→</span></span>';
      return a;
    }

    // reading
    var reads = document.getElementById("reads");
    G.reads.forEach(function(r){
      reads.appendChild(item({tag:r.vein, title:r.title, sub:r.author+" · "+r.source+" · "+r.year, note:r.note, url:r.url}));
    });

    // listening: podcasts + playlists
    var listen = document.getElementById("listen");
    G.listening.podcasts.forEach(function(p){
      listen.appendChild(item({tag:"Podcast", title:p.title, sub:p.show+" · "+p.who, note:p.note, url:p.url, audio:true}));
    });
    // playlist as a row with a peek of tracks
    var w = G.listening.workout;
    var mix = item({tag:"Playlist", title:w.title, sub:w.tracks.length+" tracks · "+w.subtitle, url:w.url, audio:true});
    mix.classList.add("mixrow");
    var ol = document.createElement("ul"); ol.className = "tracks";
    ol.innerHTML = w.tracks.map(function(t,i){return '<li><span class="n">'+String(i+1).padStart(2,"0")+'</span>'+t[0]+'</li>';}).join("");
    mix.querySelector(".l").appendChild(ol);
    listen.appendChild(mix);
    var wd = G.listening.windDown;
    listen.appendChild(item({tag:"Playlist", title:wd.title, sub:wd.tracks.length+" tracks · "+wd.subtitle, url:"https://open.spotify.com/search/"+encodeURIComponent(wd.tracks[0][1]), audio:true}));

    // one inline player (Spotify, reliable)
    var pl = document.createElement("div"); pl.className = "player reveal";
    pl.innerHTML = '<div class="pl">▶ Plays here</div><iframe src="https://open.spotify.com/embed/episode/1seRMg5Zdg5nBuw0W4Q3WB?utm_source=generator" width="100%" height="152" frameborder="0" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>';
    listen.appendChild(pl);

    // watching
    var watch = document.getElementById("watch");
    (G.watch||[]).forEach(function(f){
      watch.appendChild(item({tag:f.vein, title:f.title, sub:f.who+" · "+f.year, note:f.note, url:f.url}));
    });

    if (window.__initReveals) window.__initReveals();
  </script>
</body>
</html>
