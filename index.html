<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#F6F5F1" />
<title>Mike Cragg</title>
<meta name="description" content="A few things worth reading, hearing, and watching." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#F6F5F1; --paper:#FFFFFF; --ink:#16181C; --muted:#6B6F76; --faint:#9A9DA3;
    --blue:#1F4FD6; --green:#0E9F5E; --line:#E4E2DA; --line2:#EEEDE7;
    --sans:"Inter",-apple-system,BlinkMacSystemFont,sans-serif; --mono:"IBM Plex Mono",monospace;
    --ease:cubic-bezier(0.16,1,0.3,1);
    --gut:clamp(1.5rem,5vw,4rem);
    /* gutters that always clear the notch / screen edge */
    --padL:max(var(--gut), env(safe-area-inset-left));
    --padR:max(var(--gut), env(safe-area-inset-right));
  }
  *,*::before,*::after{box-sizing:border-box;margin:0}
  html{-webkit-font-smoothing:antialiased;scroll-behavior:smooth;-webkit-text-size-adjust:100%;text-size-adjust:100%}
  body{background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:1.05rem;line-height:1.7;text-rendering:optimizeLegibility;overflow-x:hidden}
  a{color:inherit;text-decoration:none;-webkit-tap-highlight-color:transparent}
  img,svg{display:block;max-width:100%}
  .wrap{max-width:760px;margin:0 auto;padding-left:var(--padL);padding-right:var(--padR)}
  .tag{font-family:var(--mono);font-size:.66rem;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--green)}
  .meta{font-family:var(--mono);font-size:.7rem;letter-spacing:.04em;color:var(--muted)}
  .reveal{opacity:0;transform:translateY(14px);transition:opacity .7s var(--ease),transform .7s var(--ease)}
  .reveal.in{opacity:1;transform:none}
  @media(prefers-reduced-motion:reduce){*{transition-duration:.01ms!important}.reveal{opacity:1;transform:none}}

  /* ---------- top ---------- */
  .top{display:flex;justify-content:space-between;align-items:baseline;gap:1rem;
    padding:calc(env(safe-area-inset-top) + 2.4rem) var(--padR) 0 var(--padL);max-width:760px;margin:0 auto}
  .group.first{padding-top:clamp(1.8rem,5vh,2.6rem)}
  .top .mark{font-family:var(--sans);font-weight:700;font-size:.92rem;letter-spacing:.14em;text-transform:uppercase}
  .top .where{font-family:var(--mono);font-size:.7rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}

  .hr{height:1px;background:var(--line);max-width:760px;margin:0 auto}

  /* ---------- index of items ---------- */
  .group{padding:clamp(2rem,5vh,3rem) 0}
  .group .lbl{font-family:var(--mono);font-size:.7rem;letter-spacing:.16em;text-transform:uppercase;color:var(--faint);margin-bottom:1.4rem}
  .item{display:grid;grid-template-columns:1fr auto;gap:1rem 1.2rem;align-items:baseline;
    padding:1.25rem 0;border-top:1px solid var(--line2);transition:padding-left .4s var(--ease)}
  .item:hover{padding-left:.5rem}
  .item .l{min-width:0}
  .item .tag{margin-bottom:.45rem;display:block}
  .item h3{font-size:1.22rem;font-weight:600;letter-spacing:-.01em;line-height:1.25;transition:color .3s var(--ease)}
  .item:hover h3{color:var(--blue)}
  .item .sub{font-family:var(--mono);font-size:.72rem;color:var(--muted);margin-top:.35rem}
  .item .note{font-size:.98rem;color:var(--muted);margin-top:.5rem;max-width:60ch;line-height:1.5}
  .item .go{align-self:center;font-family:var(--mono);font-size:.7rem;letter-spacing:.1em;text-transform:uppercase;color:var(--blue);white-space:nowrap}
  .item .go .ar{display:inline-block;transition:transform .4s var(--ease)}
  .item:hover .go .ar{transform:translateX(4px)}
  .item.audio .go::before{content:"▶  ";color:var(--green)}
  @media(max-width:520px){
    .item{grid-template-columns:1fr;gap:0}
    .item .go{grid-row:1;justify-self:start;align-self:baseline;margin-bottom:.55rem;order:-1}
  }

  /* ---------- inline players (media) ---------- */
  .media{padding:1.5rem 0;border-top:1px solid var(--line2)}
  .media .tag{display:block;margin-bottom:.4rem}
  .media h3{font-size:1.12rem;font-weight:600;letter-spacing:-.01em;line-height:1.25}
  .media .sub{font-family:var(--mono);font-size:.7rem;color:var(--muted);margin-top:.3rem}
  .media .note{font-size:.95rem;color:var(--muted);margin-top:.45rem;max-width:60ch;line-height:1.5}
  .media .frame{margin-top:.95rem;border-radius:12px;overflow:hidden;border:1px solid var(--line)}
  /* youtube — click-to-load facade keeps the page light */
  .yt{position:relative;aspect-ratio:16/9;cursor:pointer;background:#0B0C0E}
  .yt img{width:100%;height:100%;object-fit:cover}
  .yt iframe{width:100%;height:100%;border:0;display:block}
  .yt .pbtn{position:absolute;inset:0;margin:auto;width:62px;height:62px;border-radius:50%;
    background:rgba(11,12,14,.62);display:grid;place-items:center;transition:transform .3s var(--ease),background .3s var(--ease)}
  .yt:hover .pbtn{background:var(--blue);transform:scale(1.07)}
  .yt .pbtn svg{width:23px;height:23px;fill:#fff;margin-left:3px}
  .sp iframe{width:100%;display:block;border:0}

  footer{padding:3rem 0 calc(env(safe-area-inset-bottom) + 3.2rem)}
  footer .row{display:flex;justify-content:space-between;align-items:baseline;gap:1rem;max-width:760px;margin:0 auto;padding-left:var(--padL);padding-right:var(--padR)}
  footer .mark{font-weight:700;font-size:.92rem;letter-spacing:.14em;text-transform:uppercase}
  footer .meta a{color:var(--blue)}
</style>
</head>
<body class="no-grain">
  <header class="top">
    <span class="mark">Mike Cragg</span>
    <span class="where">Vancouver · 49.28°N</span>
  </header>

  <main>
    <section class="group wrap first" id="g-read"><div class="lbl">Read</div><div id="reads"></div></section>
    <div class="hr"></div>
    <section class="group wrap" id="g-sport"><div class="lbl">Sport</div><div id="sport"></div></section>
    <div class="hr"></div>
    <section class="group wrap" id="g-listen"><div class="lbl">Listen</div><div id="listen"></div></section>
    <div class="hr"></div>
    <section class="group wrap" id="g-watch"><div class="lbl">Watch</div><div id="watch"></div></section>
  </main>

  <footer>
    <div class="row"><span class="mark">Mike Cragg</span><span class="meta">No. 87 · <a href="versions.html">versions</a></span></div>
  </footer>

  <script src="assets/content.js"></script>
  <script src="assets/reveal.js"></script>
  <script>
    var G = window.GIFT;

    function item(opts){
      // opts: tag, title, sub, note, url, audio
      var a = document.createElement("a");
      a.href = opts.url; a.target = "_blank"; a.rel = "noopener";
      a.className = "item reveal" + (opts.audio ? " audio" : "");
      a.innerHTML =
        '<div class="l">' +
          '<span class="tag">'+opts.tag+'</span>' +
          '<h3>'+opts.title+'</h3>' +
          (opts.sub ? '<div class="sub">'+opts.sub+'</div>' : '') +
          (opts.note ? '<div class="note">'+opts.note+'</div>' : '') +
        '</div>' +
        '<span class="go">'+(opts.audio?'Play':'Open')+' <span class="ar">→</span></span>';
      return a;
    }

    var PLAY = '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 5v14l11-7z"/></svg>';

    // Read — article links
    var reads = document.getElementById("reads");
    G.reads.forEach(function(r){
      reads.appendChild(item({tag:r.vein, title:r.title, sub:r.author+" · "+r.source+" · "+r.year, note:r.note, url:r.url}));
    });

    // Sport / Listen / Watch — inline players from G.media
    function mediaCard(m){
      var card = document.createElement("div");
      card.className = "media reveal";
      var head =
        '<a href="'+(m.platform==="youtube"?"https://www.youtube.com/watch?v="+m.id:"https://open.spotify.com/"+m.kind+"/"+m.id)+'" target="_blank" rel="noopener">' +
          '<span class="tag">'+m.vein+'</span>' +
          '<h3>'+m.title+'</h3>' +
        '</a>' +
        '<div class="sub">'+m.who+' · '+m.source+' · '+m.year+'</div>' +
        (m.note ? '<div class="note">'+m.note+'</div>' : '');
      if (m.platform === "youtube"){
        card.innerHTML = head +
          '<div class="frame yt">' +
            '<img loading="lazy" src="https://i.ytimg.com/vi/'+m.id+'/hqdefault.jpg" alt="" />' +
            '<div class="pbtn">'+PLAY+'</div>' +
          '</div>';
        var yt = card.querySelector(".yt");
        yt.addEventListener("click", function(){
          yt.innerHTML = '<iframe src="https://www.youtube.com/embed/'+m.id+'?autoplay=1&rel=0" title="'+m.title+'" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>';
        });
      } else {
        var h = (m.kind === "playlist") ? 352 : 152;
        card.innerHTML = head +
          '<div class="frame sp"><iframe loading="lazy" src="https://open.spotify.com/embed/'+m.kind+'/'+m.id+'?utm_source=generator" width="100%" height="'+h+'" frameborder="0" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"></iframe></div>';
      }
      return card;
    }

    ["sport","listen","watch"].forEach(function(sec){
      var el = document.getElementById(sec);
      (G.media||[]).filter(function(m){return m.section===sec;}).forEach(function(m){
        el.appendChild(mediaCard(m));
      });
    });

    if (window.__initReveals) window.__initReveals();
  </script>
</body>
</html>
