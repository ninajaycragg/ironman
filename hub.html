<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>The Hub — for Dad</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..600;1,9..144,300..500&family=Inter:wght@400;500;600&family=Newsreader:ital,opsz,wght@0,6..72,300..500;1,6..72,300..420&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="assets/tokens.css" />
<style>
  body { background: var(--bg); }
  .topbar { display:flex; justify-content: space-between; align-items:center; padding: 1.1rem var(--gutter); }
  .topbar a { text-decoration:none; font-size:.78rem; letter-spacing:.18em; text-transform:uppercase; color: var(--text-muted); }
  .topbar a:hover { color: var(--accent); }
  .topbar .now { font-family: var(--serif); font-size: 1.05rem; color: var(--text); letter-spacing:0; }

  .hub { max-width: 880px; margin: 0 auto; padding: 1rem var(--gutter) 5rem; }

  /* hero feature: one big play */
  .feature { position: relative; overflow:hidden; border-radius: 8px; color: var(--d-text);
    padding: clamp(2.2rem, 6vw, 4rem); margin: 1.5rem 0 2rem; }
  .feature .bg { position:absolute; inset:0; z-index:0; }
  .feature .in { position: relative; z-index: 2; }
  .feature .eyebrow { color: var(--d-accent); }
  .feature h1 { color: var(--d-text); font-size: clamp(2.2rem, 6vw, 3.8rem); font-weight: 330; margin: .7rem 0 .4rem; }
  .feature .sub { color: var(--d-text); opacity:.85; font-family: var(--read); font-style: italic; font-size: 1.15rem; max-width: 38ch; }
  .feature .play {
    display:inline-flex; align-items:center; gap:.7rem; margin-top: 1.6rem;
    background: var(--d-accent); color: #1B2230; border:0; border-radius: 999px;
    font-family: var(--sans); font-weight: 600; font-size: 1rem; letter-spacing:.01em;
    padding: .9rem 1.6rem; cursor:pointer; text-decoration:none;
    transition: transform .4s var(--ease-out-soft), filter .4s var(--ease-quiet); }
  .feature .play:hover { transform: translateY(-2px); filter: brightness(1.06); }
  .feature .play svg { width: 16px; height:16px; fill: currentColor; }
  .feature .ranges { position:absolute; left:0; right:0; bottom:0; z-index:1; opacity:.7; }

  /* tabs */
  .tabs { display:flex; gap:.4rem; border-bottom: 1px solid var(--border); margin-bottom: 1.6rem; }
  .tab { all: unset; cursor:pointer; font-family: var(--sans); font-size: .82rem; letter-spacing:.14em;
    text-transform: uppercase; color: var(--text-muted); padding: .8rem 1rem; border-bottom: 2px solid transparent;
    transition: color .3s var(--ease-quiet), border-color .3s var(--ease-quiet); }
  .tab[aria-selected="true"] { color: var(--accent); border-color: var(--accent); }
  .panel { display:none; }
  .panel.on { display:block; animation: fade .5s var(--ease-out-soft); }
  @keyframes fade { from { opacity:0; transform: translateY(8px);} to {opacity:1; transform:none;} }

  /* listen rows — big tap targets */
  .row { display:grid; grid-template-columns: 1fr auto; gap: 1rem; align-items:center;
    padding: 1.1rem 1.1rem; border:1px solid var(--border); border-radius: 6px; margin-bottom:.7rem;
    text-decoration:none; color: var(--text); background: var(--surface);
    transition: transform .4s var(--ease-out-soft), background .35s var(--ease-quiet); }
  .row:hover { transform: translateY(-2px); background: var(--bg); }
  .row .show { font-size:.68rem; letter-spacing:.16em; text-transform:uppercase; color: var(--text-muted); }
  .row .pt { font-family: var(--serif); font-size: 1.2rem; margin-top:.12rem; }
  .row .who { font-size:.82rem; color: var(--text-muted); }
  .row .play-mini { width:42px; height:42px; border-radius:50%; background: var(--accent); display:grid; place-items:center; flex:none; }
  .row .play-mini svg { width:15px; height:15px; fill: var(--bg); }
  .subhead { font-family: var(--sans); font-size:.74rem; letter-spacing:.24em; text-transform:uppercase; color:var(--text-muted); margin: 1.8rem 0 .9rem; }

  .mixcard { border:1px solid var(--border); border-radius:6px; padding: 1.3rem 1.3rem; background: var(--surface); }
  .mixcard h3 { font-size: 1.4rem; } .mixcard .ms { font-size:.86rem; color:var(--text-muted); margin:.3rem 0 .9rem; }
  .mixcard ul { list-style:none; columns:2; column-gap:2rem; }
  .mixcard li { font-size:.9rem; padding:.22rem 0; break-inside:avoid; }
  .mixcard li .ar { color: var(--text-muted); }
  .mixcard .chip { margin-top:1.1rem; }

  /* read rows */
  .read { display:block; text-decoration:none; color:var(--text); padding: 1.1rem 1.1rem; border:1px solid var(--border);
    border-radius:6px; margin-bottom:.7rem; background: var(--surface); transition: transform .4s var(--ease-out-soft), background .35s var(--ease-quiet); }
  .read:hover { transform: translateY(-2px); background: var(--bg); }
  .read .vein { font-size:.66rem; letter-spacing:.18em; text-transform:uppercase; color: var(--wood); }
  .read h3 { font-family: var(--serif); font-size: 1.35rem; font-weight:360; margin:.2rem 0; }
  .read .by { font-size:.8rem; color: var(--text-muted); }
  .read .note { font-family: var(--read); font-size:1rem; margin-top:.5rem; opacity:.92; }

  /* dispatch panel */
  .disp { background: var(--accent); color: var(--d-text); border-radius:8px; padding: clamp(1.8rem,5vw,3rem); }
  .disp .eyebrow { color: var(--d-accent); }
  .disp h2 { color: var(--d-text); font-size: clamp(1.9rem,4.5vw,3rem); font-weight:320; margin:.6rem 0 1.2rem; }
  .disp .stand { font-family: var(--read); font-style:italic; font-size: 1.3rem; opacity:.92; margin-bottom: 1.4rem; max-width: 34ch; }
  .disp p.b { font-family: var(--read); font-size: 1.08rem; line-height:1.8; opacity:.94; max-width: 60ch; margin-bottom: 1rem; }
  .disp em { color: var(--d-accent); font-style: italic; }
  .disp .src { font-size:.8rem; color: var(--d-muted); margin-top: 1.6rem; }

  footer { text-align:center; padding: 0 0 4rem; color: var(--text-muted); font-size:.82rem; }
  footer a { color: var(--accent); text-decoration:none; }
  footer .rule { max-width:60px; margin:0 auto 1.3rem; }
</style>
</head>
<body>
  <div class="topbar">
    <a href="index.html">← the rooms</a>
    <span class="now">For Dad</span>
    <a href="#" id="shuffle">shuffle ↻</a>
  </div>

  <main class="hub">
    <section class="feature">
      <div class="bg dusk"></div>
      <div class="in">
        <span class="eyebrow">Press play</span>
        <h1 id="f-title"></h1>
        <p class="sub" id="f-sub"></p>
        <a class="play" id="f-play" target="_blank" rel="noopener"></a>
      </div>
      <svg class="ranges" viewBox="0 0 1440 200" preserveAspectRatio="none" aria-hidden="true">
        <path d="M0,130 L300,70 L560,128 L820,60 L1080,125 L1300,85 L1440,120 L1440,200 L0,200 Z" fill="#26324A" opacity="0.55"/>
        <path d="M0,170 L360,135 L720,172 L1080,138 L1440,168 L1440,200 L0,200 Z" fill="#11161F" opacity="0.8"/>
      </svg>
    </section>

    <div class="tabs" role="tablist">
      <button class="tab" role="tab" aria-selected="true" data-p="listen">Listen</button>
      <button class="tab" role="tab" aria-selected="false" data-p="read">Read</button>
      <button class="tab" role="tab" aria-selected="false" data-p="note">A note</button>
    </div>

    <section class="panel on" id="p-listen">
      <div class="subhead">Podcasts</div>
      <div id="pods"></div>
      <div class="subhead">The run mix</div>
      <div class="mixcard" id="mix"></div>
      <div class="subhead">Wind-down</div>
      <div class="mixcard" id="wind"></div>
    </section>

    <section class="panel" id="p-read">
      <div id="reads"></div>
    </section>

    <section class="panel" id="p-note">
      <div class="disp">
        <span class="eyebrow" id="d-kick"></span>
        <h2 id="d-title"></h2>
        <p class="stand" id="d-stand"></p>
        <div id="d-body"></div>
        <p class="src" id="d-src"></p>
      </div>
    </section>
  </main>

  <footer>
    <hr class="rule" />
    <p>The Hub · one of four rooms. <a href="index.html">See the others →</a></p>
  </footer>

  <script src="assets/content.js"></script>
  <script src="assets/reveal.js"></script>
  <script>
    var G = window.GIFT, ICON = window.PLAY_ICON;

    // feature = run mix
    var w = G.listening.workout;
    document.getElementById("f-title").textContent = w.title;
    document.getElementById("f-sub").textContent = w.subtitle;
    var fp = document.getElementById("f-play"); fp.href = w.url; fp.innerHTML = ICON + "Play the mix";

    // podcasts
    var pods = document.getElementById("pods");
    G.listening.podcasts.forEach(function (p) {
      var a = document.createElement("a");
      a.href = p.url; a.target="_blank"; a.rel="noopener"; a.className="row";
      a.innerHTML = '<div><div class="show">'+p.show+'</div><div class="pt">'+p.title+'</div><div class="who">'+p.who+'</div></div>' +
        '<span class="play-mini">'+ICON+'</span>';
      pods.appendChild(a);
    });

    // mix card
    document.getElementById("mix").innerHTML = '<h3>'+w.title+'</h3><p class="ms">'+w.subtitle+'</p><ul>' +
      w.tracks.map(function (t){return '<li>'+t[0]+' <span class="ar">— '+t[1]+'</span></li>';}).join("") +
      '</ul><a class="chip" href="'+w.url+'" target="_blank" rel="noopener">'+ICON+'Open the mix</a>';

    // wind down
    var wd = G.listening.windDown;
    document.getElementById("wind").innerHTML = '<h3>'+wd.title+'</h3><p class="ms">'+wd.subtitle+'</p><ul>' +
      wd.tracks.map(function (t){return '<li>'+t[0]+' <span class="ar">— '+t[1]+'</span></li>';}).join("") + '</ul>';

    // reads
    var reads = document.getElementById("reads");
    G.reads.forEach(function (r) {
      var a = document.createElement("a");
      a.href = r.url; a.target="_blank"; a.rel="noopener"; a.className="read";
      a.innerHTML = '<div class="vein">'+r.vein+'</div><h3>'+r.title+'</h3>' +
        '<div class="by">'+r.author+' · '+r.source+' · '+r.year+'</div>' +
        '<div class="note">“'+r.note+'”</div>';
      reads.appendChild(a);
    });

    // dispatch
    var ds = G.dispatch;
    document.getElementById("d-kick").textContent = ds.kicker;
    document.getElementById("d-title").textContent = ds.title;
    document.getElementById("d-stand").textContent = ds.standfirst;
    document.getElementById("d-body").innerHTML = ds.body.map(function (p){return '<p class="b">'+p+'</p>';}).join("");
    document.getElementById("d-src").textContent = ds.source;

    // tabs
    var tabs = document.querySelectorAll(".tab");
    tabs.forEach(function (t) {
      t.addEventListener("click", function () {
        tabs.forEach(function (x){ x.setAttribute("aria-selected","false"); });
        t.setAttribute("aria-selected","true");
        document.querySelectorAll(".panel").forEach(function (p){ p.classList.remove("on"); });
        document.getElementById("p-"+t.dataset.p).classList.add("on");
      });
    });
    document.getElementById("shuffle").addEventListener("click", function (e) {
      e.preventDefault(); window.open(w.url, "_blank", "noopener");
    });
  </script>
</body>
</html>
